
services:

  db:
    image: postgres:15
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: mysecretpassword
      POSTGRES_DB: taxi_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db_init:/docker-entrypoint-initdb.d

  telegram-bot:
    build: .
    container_name: telegram_bot
    restart: always
    depends_on:
      - db
    volumes:
      - .:/app

volumes:
  postgres_data: